# Yad2 monitor – use this when the repo contains ONLY yad2_monitor (repo root = this folder).
# Runs every 10 min (24/7), commits report + DB. Set TELEGRAM_* and optional WHATSAPP_* secrets.
name: Yad2 Monitor

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

env:
  TZ: "Asia/Jerusalem"

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install chromium --with-deps

      - name: Create .env from secrets
        run: |
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env
          echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env
          echo "TELEGRAM_SSL_VERIFY=false" >> .env
          [ -n "${{ secrets.WHATSAPP_WEBHOOK_URL }}" ] && echo "WHATSAPP_WEBHOOK_URL=${{ secrets.WHATSAPP_WEBHOOK_URL }}" >> .env || true

      - name: Run one cycle (every 10 min, 24/7)
        run: python main.py

      - name: Commit and push report + DB
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add local_db.json report.html
          git diff --staged --quiet || (git commit -m "chore: update report and DB [skip ci]" && git push)
