# שליחת הודעת בדיקה לטלגרם מהענן (ללא המחשב שלך)
name: Test Telegram

on:
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create .env from secrets
        run: |
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env
          echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env
          echo "TELEGRAM_SSL_VERIFY=false" >> .env
          [ -n "${{ secrets.WHATSAPP_WEBHOOK_URL }}" ] && echo "WHATSAPP_WEBHOOK_URL=${{ secrets.WHATSAPP_WEBHOOK_URL }}" >> .env || true

      - name: Send test message (Telegram + WhatsApp + console)
        run: python main.py --test
